services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledgerworks
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledgerworks"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:10
    depends_on:
      db:
        condition: service_healthy
    command: ["migrate"]
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/ledgerworks
      FLYWAY_USER: ledger
      FLYWAY_PASSWORD: ledger
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_CONNECT_RETRIES: 30
    volumes:
      - ./db/migrations:/flyway/sql

volumes:
  pgdata:
